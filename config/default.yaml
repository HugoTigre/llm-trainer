
# Default configuration for training and evaluation.
# Paths are relative to the project root. Override by passing --config path/to/other.yaml
# when running scripts.

# Run identifier: all outputs for this run go under output/<run_id>/
# Use different run_id values to keep separate runs (e.g. "mistral-7b-v1", "llama-3b-experiment").
run_id: "test-run"

# Hugging Face model ID (causal LM with chat template).
# Tested: Qwen/Qwen2.5-0.5B-Instruct (too small for schema internalization),
#         Qwen/Qwen2.5-1.5B-Instruct (recommended minimum for this task).
model_id: "Qwen/Qwen2.5-1.5B-Instruct"

# Quantization for loading the base model: 4, 8, or null for full precision.
# null (full precision) recommended for models <= 3B on 32GB RAM.
# 4-bit can trigger bitsandbytes backward bugs on Apple Silicon; use 8-bit if you need quantization.
quantization_bits: null

# Training and validation data. By default they live under data/<run_id>/.
# Uncomment and set paths to override, e.g. use a shared train/val for all runs.
# data:
#   train: "data/train.jsonl"
#   val: "data/val.jsonl"

# LoRA adapter config.
## Quick reference:
## More capacity / more fit: increase r (e.g. 32, 64), or add epochs.
## Overfitting / collapse: lower alpha, increase dropout, or reduce epochs.
lora:
  # Rank: controls adapter capacity (trainable params). Higher r = more capacity but more memory.
  # r=16 is standard; increase to 32 when training needs to override strong base-model priors.
  r: 32
  # Alpha: scales LoRA influence. Keep alpha/r ratio ~2.0 for balanced effect.
  # If training collapses (repeating tokens), lower alpha or reduce to alpha=r (ratio 1.0).
  alpha: 64
  # Which layers get LoRA adapters. Attention projections are standard.
  # Add "gate_proj","up_proj","down_proj" for more capacity (MLP layers).
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]
  # Dropout: regularization to prevent overfitting.
  # Increase (0.1-0.15) when training many epochs on small data. Lower (0.05) for large datasets.
  dropout: 0.1

# Training hyperparameters.
## Quick reference:
## Out of memory: lower max_seq_length and/or batch_size (or raise gradient_accumulation_steps).
## Faster training: fewer epochs or higher learning_rate (1e-5 to 3e-5 range for LoRA).
training:
  # Path to the raw training data JSON (system_prompt, schema, user_assistant_messages).
  # Used by prepare_data.py to create train/val JSONL files.
  training_data_file: data/training_data.json
  # Whether to append the schema field to the system prompt during data preparation.
  # true: model sees function signatures during training (helps learn correct output shapes).
  # false: model learns only from examples (tests schema internalization without explicit rules).
  include_schema_in_training: false
  # Max tokens per example (input + output). Our function-call examples are short (~50-100 tokens).
  # Lower values save memory. Increase if using longer prompts (e.g. multi-step workflow agent).
  max_seq_length: 512
  # Examples per forward pass. Keep at 1 for memory efficiency; use gradient_accumulation_steps
  # to simulate larger effective batch sizes.
  batch_size: 1
  # Steps before optimizer update. Effective batch size = batch_size x this = 1x4 = 4.
  gradient_accumulation_steps: 4
  # Recompute activations in backward pass to save memory. Slower but uses ~40% less RAM.
  # Enable for models >= 1.5B or when running close to memory limits.
  gradient_checkpointing: true
  # Passes over the full training set. For schema internalization with ~200 examples, use 6-10.
  # Lower (2-3) for large datasets or if you see collapse. Watch eval loss for overfitting.
  num_epochs: 8
  # Step size for weight updates. Standard LoRA range: 1e-5 to 3e-5.
  # Lower = more stable, slower convergence. Higher = faster but risk of collapse.
  learning_rate: 2.0e-5
  # Checkpoint every N optimizer steps (saved under output/<run_id>/).
  save_steps: 50
  # Warmup: ramp LR from 0 to learning_rate over this fraction of total steps.
  warmup_ratio: 0.03

# Evaluation settings.
eval:
  # Number of examples to evaluate (drawn from val first, then train).
  max_examples: 10
  # false: eval uses system_prompt from training_data.json WITHOUT schema.
  # true: eval uses the full system prompt from JSONL examples (includes schema if it was in training).
  include_schema_in_eval: false

# RL training (REINFORCE). Runs after SFT; loads adapter from output/<run_id>/adapter.
# Saves RL-updated adapter to output/<run_id>/adapter_rl for separate evaluation.
rl:
  steps: 100
  batch_size: 4
  max_new_tokens: 64
  learning_rate: 5.0e-6
  save_steps: 50
